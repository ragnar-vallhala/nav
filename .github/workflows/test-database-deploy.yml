name: Deploy Test Database Registry

on:
  workflow_run:
    workflows:
      - Test Database Backend
      - Test Database Frontend
      - Test Database Worker
      - Publish Test Database Backend Image
      - Publish Test Database Frontend Image
      - Publish Test Database Worker Image
    types: [completed]
    branches: [dev]
  workflow_dispatch:
    inputs:
      sha:
        description: Full commit SHA to deploy
        required: true

permissions:
  actions: read
  contents: read

concurrency:
  group: nav-registry-deploy-${{ github.event.workflow_run.head_sha || inputs.sha }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy successful registry build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev')

    steps:
      - name: Check required workflow results
        id: gate
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const required = [
              'Test Database Backend',
              'Test Database Frontend',
              'Test Database Worker',
              'Publish Test Database Backend Image',
              'Publish Test Database Frontend Image',
              'Publish Test Database Worker Image',
            ];

            const sha = context.payload.workflow_run.head_sha;
            const branch = context.payload.workflow_run.head_branch;
            const { owner, repo } = context.repo;
            const runs = [];

            for (let page = 1; page <= 3; page += 1) {
              const response = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                branch,
                event: 'push',
                per_page: 100,
                page,
              });
              runs.push(...response.data.workflow_runs.filter((run) => run.head_sha === sha));
              if (response.data.workflow_runs.length < 100) break;
            }

            const latest = new Map();
            for (const run of runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))) {
              if (required.includes(run.name) && !latest.has(run.name)) {
                latest.set(run.name, run);
              }
            }

            const missing = required.filter((name) => !latest.has(name));
            const pending = required.filter((name) => latest.get(name)?.status !== 'completed');
            const failed = required.filter((name) => latest.get(name)?.conclusion !== 'success');

            core.info(`Commit: ${sha}`);
            for (const name of required) {
              const run = latest.get(name);
              core.info(`${name}: ${run ? `${run.status}/${run.conclusion}` : 'missing'}`);
            }

            if (missing.length || pending.length) {
              core.notice(`Waiting for workflows: ${[...missing, ...pending].join(', ')}`);
              core.setOutput('ready', 'false');
              return;
            }

            if (failed.length) {
              core.setFailed(`Deployment blocked by failed workflows: ${failed.join(', ')}`);
              return;
            }

            core.setOutput('ready', 'true');
            core.setOutput('sha', sha);

      - name: Select manual deployment SHA
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"

      - name: Stop if build gate is still waiting
        if: github.event_name == 'workflow_run' && steps.gate.outputs.ready != 'true'
        run: echo "Not all required workflows are ready for this commit yet."

      - name: Configure SSH
        if: (github.event_name == 'workflow_dispatch' && steps.manual.outputs.ready == 'true') || (github.event_name == 'workflow_run' && steps.gate.outputs.ready == 'true')
        env:
          NAV_DEPLOY_SSH_KEY: ${{ secrets.NAV_DEPLOY_SSH_KEY }}
          NAV_DEPLOY_HOST: ${{ secrets.NAV_DEPLOY_HOST }}
        run: |
          test -n "$NAV_DEPLOY_SSH_KEY"
          test -n "$NAV_DEPLOY_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$NAV_DEPLOY_SSH_KEY" > ~/.ssh/nav_deploy
          chmod 600 ~/.ssh/nav_deploy
          ssh-keyscan -H "$NAV_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Kubernetes
        if: (github.event_name == 'workflow_dispatch' && steps.manual.outputs.ready == 'true') || (github.event_name == 'workflow_run' && steps.gate.outputs.ready == 'true')
        env:
          NAV_DEPLOY_HOST: ${{ secrets.NAV_DEPLOY_HOST }}
          NAV_DEPLOY_USER: ${{ secrets.NAV_DEPLOY_USER }}
          DEPLOY_SHA: ${{ steps.gate.outputs.sha || steps.manual.outputs.sha }}
        run: |
          test -n "$NAV_DEPLOY_USER"
          ssh -i ~/.ssh/nav_deploy "$NAV_DEPLOY_USER@$NAV_DEPLOY_HOST" "nav-deploy $DEPLOY_SHA"
