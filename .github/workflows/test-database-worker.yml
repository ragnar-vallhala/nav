name: Test Database Worker

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/test-database-worker.yml"
      - "test_database/worker/**"
      - "test_database/database/**"
      - "test_database/docker-compose.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/workflows/test-database-worker.yml"
      - "test_database/worker/**"
      - "test_database/database/**"
      - "test_database/docker-compose.yml"
  workflow_dispatch:

jobs:
  worker:
    name: Worker install, import smoke, and image build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: test_database/worker/package-lock.json

      - name: Install worker dependencies
        working-directory: test_database/worker
        run: npm ci

      - name: Check worker JavaScript syntax
        working-directory: test_database/worker
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run worker import smoke test
        working-directory: test_database/worker
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: "25432"
          DB_USER: nav_sample
          DB_PASSWORD: nav_sample_password
          DB_NAME: nav_sample_registry
          MINIO_ENDPOINT: 127.0.0.1
          MINIO_PORT: "29000"
          MINIO_USE_SSL: "false"
          MINIO_ACCESS_KEY: navsample
          MINIO_SECRET_KEY: navsamplepassword
        run: node src/worker.js

      - name: Build worker Docker image
        working-directory: test_database
        run: docker build -f worker/Dockerfile -t nav-registry-worker:ci .
