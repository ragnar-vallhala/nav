name: Test Database Frontend

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/test-database-frontend.yml"
      - "test_database/frontend/**"
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/workflows/test-database-frontend.yml"
      - "test_database/frontend/**"
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend install, production build, and image build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: test_database/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: test_database/frontend
        run: npm ci

      - name: Build frontend
        working-directory: test_database/frontend
        env:
          VITE_API_BASE: http://localhost:14000
        run: npm run build

      - name: Verify frontend artifact
        working-directory: test_database/frontend
        run: test -f dist/index.html

      - name: Build frontend Docker image
        working-directory: test_database/frontend
        run: docker build -t nav-registry-frontend:ci .
