name: Publish Test Database Frontend Image

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/workflows/test-database-frontend-image.yml"
      - "test_database/frontend/**"
  pull_request:
    branches: [main, dev]
    paths:
      - ".github/workflows/test-database-frontend-image.yml"
      - "test_database/frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ragnar-vallhala/nav-frontend

jobs:
  publish:
    name: Build and publish frontend image
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: test_database/frontend
          file: test_database/frontend/Dockerfile.production
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          build-args: |
            VITE_API_BASE=https://navdev.navrobotec.com/api
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=nav-frontend
          cache-to: type=gha,mode=max,scope=nav-frontend
