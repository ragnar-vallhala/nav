name: Build and Release Artifacts

on:
  push:
    tags:
      - 'v*' # Trigger workflow whenever you push a version tag (e.g. v1.0.0)

permissions:
  contents: write

jobs:
  release:
    name: Create Deb Package and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Core Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libssl-dev

      - name: Build Core Runtime
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j $(nproc)

      - name: Package for Debian
        run: |
          cd build
          cpack -G DEB

      - name: Deploy to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: build/*.deb
          body: |
            # Nav — Embedded Development Orchestrator

            Nav is a unified embedded systems development tool focused on robotics, drones, firmware, and hardware deployment workflows.
            
            **Release Highlights:**
            - Dynamic path-based hardware validation.
            - Integrated native POSIX serial bridge.
            - Fault-tolerant workspace synchronization.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
