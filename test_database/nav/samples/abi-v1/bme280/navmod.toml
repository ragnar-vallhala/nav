[package]
kind = "module"
name = "bme280"
version = "1.2.0"
license = "Apache-2.0"
authors = ["Navrobotec <registry@navrobotec.online>"]
description = "ABI v1 sample sensor module."

[abi]
abi_version = 1
hal_api_version = 1

[requires]
caps = ["I2C", "TIMER"]

[requires.optional]
caps = ["I2C_DMA"]

[build]
sources = ["src/**/*.c"]
include_dirs = ["include"]
